services:
  flask:
    build:
      context: ./
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - parthub
    volumes:
      - D:\igem\igem_software\fudan_2024\parthub\semantic_data:/app/parthub/semantic_data
    environment:
      - SERVER_URL=bolt://parthub:7687
      - SERVER_USER=neo4j
      - SERVER_PASSWORD=igem2024
      - HF_ENDPOINT=https://hf-mirror.com
  parthub:
    image: neo4j:5.11
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/igem2024
      - NEO4J_PLUGINS=["graph-data-science"]
      - NEO4J_dbms_security_procedures_allowlist=gds.*
      - NEO4J_dbms_security_procedures_unrestricted=gds.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - D:\Neo4jData\parthub:/data
    deploy:
      resources:
        reservations:
          memory: 2G
